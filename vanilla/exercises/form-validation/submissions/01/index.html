<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Form Validation Lab</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav><a href="/">&larr; Back to exercises</a></nav>
  <main>
    <h1>Add User</h1>
    <form id="user-form" novalidate>
      <div id="general-errors" class="general-errors hidden"></div>
      <div class="form-group">
        <label for="first-name">First Name</label>
        <input type="text" id="first-name" name="first-name" placeholder="Enter first name">
        <span class="error-msg" id="first-name-error"></span>
      </div>

      <div class="form-group">
        <label for="last-name">Last Name</label>
        <input type="text" id="last-name" name="last-name" placeholder="Enter last name">
        <span class="error-msg" id="last-name-error"></span>
      </div>

      <button type="submit" class="submit-btn">Add User</button>
    </form>

    <section id="user-list-section" class="hidden">
      <h2>Users</h2>
      <ul id="user-list"></ul>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
